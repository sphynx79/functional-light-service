# require: rubocop-performance

AllCops:
  TargetRubyVersion: 3.1
  Exclude:
    - 'lib/functional-light-service.rb'
    - 'vendor/bundle/**/*'
    - 'gemfiles/vendor/bundle/**/*'
    - 'bin/*'
    - 'functional-light-service.gemspec'
    - 'audit/**/*'
  NewCops: enable
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  Include:
    - 'lib/**/*.rb'

Style/Encoding:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/FormatStringToken:
  Enabled: false

Style/RedundantReturn:
  Enabled: false

Style/SignalException:
  Enabled: true

Style/HashSyntax:
  EnforcedStyle: hash_rockets

Style/TrivialAccessors:
  AllowPredicates: true

Style/MissingRespondToMissing:
  Enabled: false

Style/Alias:
  Enabled: false

Style/Lambda:
  EnforcedStyle: literal

Naming/PredicatePrefix:
  Enabled: false

Metrics/MethodLength:
  Max: 15

Metrics/BlockLength:
  Max: 35
  Exclude:
    - 'spec/**/*.rb'

Metrics/AbcSize:
  Max: 24

Naming/MethodParameterName:
  Enabled: false

Layout/TrailingEmptyLines:
  Enabled: false

Layout/LineLength:
  Max: 100

Layout/EndOfLine:
  Enabled: False

Lint/ConstantDefinitionInBlock:
  Exclude:
    - 'spec/**/*.rb'

Lint/EmptyClass:
  Exclude:
    - 'spec/**/*.rb'

# I cop nuovi sono abilitati automaticamente da NewCops: enable

# Template method (throw_error_predicate) e simili: nomi storici dell'API interna
Naming/PredicateMethod:
  Enabled: false

# La gem definisce deliberatamente classi correlate nello stesso file
# (Result + Prelude, i verifier delle chiavi, i test double)
Style/OneClassPerFile:
  Enabled: false

# Nelle spec l'include a top-level e' prassi
Style/MixinUsage:
  Exclude:
    - 'spec/**/*.rb'
